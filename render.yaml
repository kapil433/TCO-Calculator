services:
  - type: web
    name: tco-calculator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://kapil433.github.io
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
